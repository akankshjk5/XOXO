<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="XOXO Travels">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2e24"/>
      <stop offset="50%" stop-color="#0D3D2E"/>
      <stop offset="100%" stop-color="#1a4d3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D3D2E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <ellipse cx="960" cy="900" rx="800" ry="200" fill="#0a2e24" opacity="0.6"/>
</svg>
