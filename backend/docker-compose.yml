# Local production-like stack for integration testing
# Usage: docker compose up --build

services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/xoxo-travels
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
      - api_invoices:/app/invoices
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  api_uploads:
  api_invoices:
